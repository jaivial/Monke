    <title>MONKE</title>
    <style>
      /* Instant boot splash: painted the moment the document parses, before the
         JS bundle downloads and React mounts (a ~2-5s gap, worse from a slow
         flash drive). React replaces #root's contents when it's ready, so this
         disappears automatically. Keeps the window from showing blank/dark. */
      html, body { margin: 0; height: 100%; background: #0a0a0c; }
      #boot-splash {
        position: fixed; inset: 0; display: flex; flex-direction: column;
        align-items: center; justify-content: center; gap: 16px;
        background: #0a0a0c; color: #e8e8ea;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        -webkit-app-region: drag;
      }
      #boot-splash .face { width: 84px; height: 84px; object-fit: contain; user-select: none; -webkit-user-drag: none; }
      #boot-splash .ring {
        width: 28px; height: 28px; border-radius: 50%;
        border: 3px solid rgba(255,255,255,0.12);
        border-top-color: rgba(255,255,255,0.75);
        animation: boot-spin 0.9s linear infinite;
      }
      #boot-splash .wm { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; color: #d8d8de; }
      #boot-splash .sub { font-size: 10.5px; letter-spacing: 0.22em; text-transform: uppercase; color: #6f6f78; }
      @keyframes boot-spin { to { transform: rotate(360deg); } }
      @media (prefers-reduced-motion: reduce) { #boot-splash .ring { animation: none; } }
    </style>
  </head>
